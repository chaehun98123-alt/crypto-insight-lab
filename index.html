<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>CRYPTO INSIGHT LAB</title>
<style>
:root{
  --bg-main:#0b0e14;
  --bg-panel:#12161f;
  --line:#232a38;
  --text-main:#e8ecf1;
  --text-sub:#8a93a6;
  --neon-green:#39ff9d;
  --neon-violet:#8b5cf6;
  --up-red:#ff4d5e;
  --down-blue:#3ba7ff;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg-main);color:var(--text-main);font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",sans-serif;line-height:1.6;}
a{color:inherit;text-decoration:none;}
.blog-header{background:linear-gradient(135deg,#0b0e14 0%,#141a2a 60%,#0b0e14 100%);border-bottom:1px solid var(--line);padding:36px 20px 28px;text-align:center;position:relative;overflow:hidden;}
.blog-header::before{content:"";position:absolute;top:-60px;left:50%;transform:translateX(-50%);width:600px;height:200px;background:radial-gradient(ellipse at center, rgba(57,255,157,0.15), transparent 70%);}
.blog-title{font-size:30px;font-weight:800;letter-spacing:-0.5px;margin:0 0 8px;background:linear-gradient(90deg,var(--neon-green),var(--neon-violet));-webkit-background-clip:text;background-clip:text;color:transparent;position:relative;}
.blog-desc{font-size:13px;color:var(--text-sub);margin:0;position:relative;}
.blog-nav{display:flex;justify-content:center;gap:4px;background:var(--bg-panel);border-bottom:1px solid var(--line);padding:0 12px;overflow-x:auto;}
.blog-nav a{padding:14px 16px;font-size:14px;font-weight:600;color:var(--text-sub);white-space:nowrap;border-bottom:2px solid transparent;transition:.15s;cursor:pointer;}
.blog-nav a:hover, .blog-nav a.active{color:var(--neon-green);border-bottom-color:var(--neon-green);}
.layout{max-width:1080px;margin:28px auto;padding:0 20px;display:flex;gap:24px;align-items:flex-start;}
.main-col{flex:1;min-width:0;}
.side-col{width:280px;flex-shrink:0;display:flex;flex-direction:column;gap:16px;}
.post-card{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:22px;margin-bottom:18px;transition:.15s;cursor:pointer;}
.post-card:hover{border-color:var(--neon-green);transform:translateY(-2px);}
.post-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--neon-green);background:rgba(57,255,157,0.1);border:1px solid rgba(57,255,157,0.3);border-radius:20px;padding:3px 10px;margin-bottom:10px;}
.post-title{font-size:18px;font-weight:800;margin:0 0 8px;}
.post-excerpt{font-size:13.5px;color:var(--text-sub);margin:0 0 14px;}
.post-meta{font-size:12px;color:var(--text-sub);display:flex;gap:12px;border-top:1px solid var(--line);padding-top:12px;}
.post-body{display:none;font-size:14px;color:var(--text-main);white-space:pre-line;border-top:1px solid var(--line);margin-top:14px;padding-top:14px;}
.post-card.open .post-body{display:block;}
.widget{background:var(--bg-panel);border:1px solid var(--line);border-radius:14px;padding:18px;}
.widget h3{font-size:14px;font-weight:800;margin:0 0 14px;padding-bottom:10px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px;}
.widget h3::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--neon-violet);display:inline-block;}
.widget ul{list-style:none;margin:0;padding:0;}
.widget li{font-size:13px;padding:8px 0;border-bottom:1px dashed var(--line);color:var(--text-sub);}
.widget li:last-child{border-bottom:none;}
.profile-widget{text-align:center;}
.profile-widget .avatar{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--neon-green),var(--neon-violet));margin:0 auto 12px;}
.profile-widget .name{font-weight:800;font-size:15px;margin-bottom:4px;}
.profile-widget .role{font-size:12px;color:var(--text-sub);}
.blog-footer{border-top:1px solid var(--line);text-align:center;padding:24px 20px 40px;font-size:11px;color:var(--text-sub);}
#emptyMsg,#loadingMsg{color:var(--text-sub);font-size:13px;text-align:center;padding:30px 0;}
#emptyMsg{display:none;}
@media (max-width:820px){.layout{flex-direction:column;}.side-col{width:100%;}}

.ticker-bar{display:flex;gap:10px;overflow-x:auto;margin-bottom:20px;padding-bottom:4px;}
.ticker-chip{flex-shrink:0;background:var(--bg-panel);border:1px solid var(--line);border-radius:10px;padding:10px 14px;font-size:12px;min-width:110px;}
.ticker-chip .name{color:var(--text-sub);font-weight:600;}
.ticker-chip .price{font-size:15px;font-weight:800;margin:2px 0;}
.ticker-chip .rate.up{color:var(--up-red);}
.ticker-chip .rate.down{color:var(--down-blue);}

.lang-switch{position:absolute;top:16px;right:20px;display:flex;gap:6px;}
.lang-switch button{background:var(--bg-panel);border:1px solid var(--line);color:var(--text-sub);font-size:12px;padding:5px 10px;border-radius:8px;cursor:pointer;font-weight:600;}
.lang-switch button.active{color:var(--neon-green);border-color:var(--neon-green);}
.post-author{color:var(--text-sub);}

.post-thumb{width:100%;height:160px;object-fit:cover;border-radius:10px;margin-bottom:14px;display:block;background:var(--bg-main);}
.post-detail{display:none;}
.post-detail.active{display:block;}
.post-detail .post-thumb{height:280px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:var(--bg-panel);border:1px solid var(--line);color:var(--text-sub);font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;margin-bottom:16px;font-weight:600;}
.back-btn:hover{color:var(--neon-green);border-color:var(--neon-green);}
.post-detail .post-title{font-size:24px;}
.post-detail .post-body{display:block;white-space:pre-line;border-top:none;margin-top:16px;padding-top:0;}
#postListView.hidden{display:none;}
</style>
</head>
<body>

<header class="blog-header">
  <div class="lang-switch" id="langSwitch">
    <button data-lang="ko">KO</button>
    <button data-lang="en">EN</button>
    <button data-lang="zh">ZH</button>
  </div>
  <h1 class="blog-title">CRYPTO INSIGHT LAB</h1>
  <p class="blog-desc">데이터로 읽는 코인 시황 · 매일 아침 업데이트</p>
</header>

<nav class="blog-nav" id="navMenu"></nav>

<div class="layout">
  <main class="main-col">
    <div class="ticker-bar" id="tickerBar">
      <div class="ticker-chip" data-market="KRW-BTC"><div class="name">BTC</div><div class="price">불러오는 중</div><div class="rate">-</div></div>
      <div class="ticker-chip" data-market="KRW-ETH"><div class="name">ETH</div><div class="price">불러오는 중</div><div class="rate">-</div></div>
      <div class="ticker-chip" data-market="KRW-SOL"><div class="name">SOL</div><div class="price">불러오는 중</div><div class="rate">-</div></div>
      <div class="ticker-chip" data-market="KRW-XRP"><div class="name">XRP</div><div class="price">불러오는 중</div><div class="rate">-</div></div>
    </div>

    <div id="postListView">
<p id="loadingMsg">글을 불러오는 중...</p>
    <div id="postList"></div>
    <p id="emptyMsg">이 카테고리에는 아직 글이 없습니다.</p>
</div>
<div id="postDetail" class="post-detail"></div>
  </main>

  <aside class="side-col">
    <div class="widget profile-widget">
      <div class="avatar"></div>
      <div class="name" id="profileName">기문탁</div>
      <div class="role">5년 차 코인 분석가 · 매일 시황 브리핑</div>
    </div>
    <div class="widget">
      <h3>최근글</h3>
      <ul id="popularList"></ul>
    </div>
    <div class="widget">
      <h3>카테고리</h3>
      <ul id="categoryCountList"></ul>
    </div>
  </aside>
</div>

<footer class="blog-footer">
  © CRYPTO INSIGHT LAB · 본 블로그의 콘텐츠는 투자 참고용이며 투자 손실에 대한 책임은 본인에게 있습니다.
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.2/marked.min.js"></script>
<script>
/* =========================================================
   아래 두 값을 GitHub 저장소 정보로 바꿔주세요.
   ========================================================= */
const GH_USER = "chaehun98123-alt";
const GH_REPO = "crypto-insight-lab";
const GH_BRANCH = "main";

const CATS = ["전체", "크립토 시황·분석", "온체인 데이터", "메이저 거래소 사용법", "공지"];
const CAT_LABELS = {
"전체": {ko:"전체보기", en:"All", zh:"全部"},
"크립토 시황·분석": {ko:"크립토 시황·분석", en:"Market Analysis", zh:"市场分析"},
"온체인 데이터": {ko:"온체인 데이터", en:"On-chain Data", zh:"链上数据"},
"메이저 거래소 사용법": {ko:"메이저 거래소 사용법", en:"Exchange Guides", zh:"交易所使用指南"},
"공지": {ko:"공지", en:"Notice", zh:"公告"}
};
const UI = {
  ko: {desc:"데이터로 읽는 코인 시황 · 매일 아침 업데이트", role:"5년 차 코인 분석가 · 매일 시황 브리핑",
       recent:"최근글", category:"카테고리", loading:"글을 불러오는 중...", empty:"이 카테고리에는 아직 글이 없습니다.",
       by:"작성", footer:"본 블로그의 콘텐츠는 투자 참고용이며 투자 손실에 대한 책임은 본인에게 있습니다."},
  en: {desc:"Reading the crypto market through data · Updated every morning", role:"Crypto analyst, 5 years of experience · Daily market briefing",
       recent:"Recent posts", category:"Categories", loading:"Loading posts...", empty:"No posts in this category yet.",
       by:"By", footer:"Content on this blog is for reference only. You are responsible for your own investment decisions."},
  zh: {desc:"用数据解读币市行情 · 每日早晨更新", role:"5年经验加密货币分析师 · 每日行情简报",
       recent:"最新文章", category:"分类", loading:"正在加载文章...", empty:"该分类下暂无文章。",
       by:"作者", footer:"本博客内容仅供参考，投资损失由本人自行承担。"}
};

let lang = localStorage.getItem('lang') || 'ko';
let activeCategory = "전체";
let posts = [];

function t(key){ return UI[lang][key]; }
function catLabel(cat){ return (CAT_LABELS[cat] && CAT_LABELS[cat][lang]) || cat; }
const translationCache = JSON.parse(localStorage.getItem('translationCache') || '{}');
function saveTransCache(){ try{ localStorage.setItem('translationCache', JSON.stringify(translationCache)); }catch(e){} }
async function translateText(text, targetLang){
if(!text) return text;
const tgt = targetLang === 'zh' ? 'zh-CN' : targetLang;
try{
const res = await fetch('https://api.mymemory.translated.net/get?q=' + encodeURIComponent(text) + '&langpair=ko|' + tgt + '&de=trsblog@example.com');
const data = await res.json();
return (data.responseData && data.responseData.translatedText) ? data.responseData.translatedText : text;
}catch(e){ console.error('translate error', e); return text; }
}
async function translateHTML(html, targetLang){
const temp = document.createElement('div');
temp.innerHTML = html;
const walker = document.createTreeWalker(temp, NodeFilter.SHOW_TEXT, null);
const nodes = [];
let n;
while(n = walker.nextNode()){ if(n.textContent.trim()) nodes.push(n); }
for(const node of nodes){ node.textContent = await translateText(node.textContent, targetLang); }
return temp.innerHTML;
}
const pendingTranslations = new Set();
function cleanTitle(t){ return String(t||'').replace(/^#+\s*/, ''); }
function field(p, base){
const direct = p[base + '_' + lang];
if(direct) return direct;
const ko = p[base + '_ko'] || '';
if(lang === 'ko' || !ko) return ko;
const cacheKey = p.slug + '|' + lang + '|' + base;
if(translationCache[cacheKey]) return translationCache[cacheKey];
if(!pendingTranslations.has(cacheKey)){
pendingTranslations.add(cacheKey);
const job = (base === 'body') ? translateHTML(ko, lang) : translateText(ko, lang);
job.then(result=>{
translationCache[cacheKey] = result;
saveTransCache();
pendingTranslations.delete(cacheKey);
const hashMatch = location.hash.match(/^#\/post\/(.+)$/);
if(hashMatch) renderDetail(decodeURIComponent(hashMatch[1]));
else renderPosts();
if(document.getElementById('popularList')) renderSidebar();
});
}
return ko;
}

function parseFrontmatter(raw, filename){
  let meta = { slug: filename.replace(/\.md$/,'') };
  if(raw.startsWith('---')){
    const rest = raw.replace(/^---\r?\n/, '');
    const closeMatch = rest.match(/\r?\n---\r?\n?/);
    let yamlPart, bodyPart;
    if(closeMatch){
      yamlPart = rest.slice(0, closeMatch.index);
      bodyPart = rest.slice(closeMatch.index + closeMatch[0].length);
    } else {
      yamlPart = rest;
      bodyPart = '';
    }
    try{
      const data = jsyaml.load(yamlPart) || {};
      meta = Object.assign(meta, data);
    }catch(e){
      console.error('frontmatter parse error', e);
    }
    if(bodyPart && bodyPart.trim() && !meta.body_ko) meta.body_ko = bodyPart.trim();
  } else {
    meta.body_ko = raw;
  }
  if(meta.date && meta.date.toISOString) meta.date = meta.date.toISOString().slice(0,10).replace(/-/g,'.');
  return meta;
}

async function loadPosts(){
  const listUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/content/posts?ref=${GH_BRANCH}`;
  const res = await fetch(listUrl);
  if(!res.ok) throw new Error('목록을 불러오지 못했습니다');
  const files = await res.json();
  const mdFiles = files.filter(f => f.name.endsWith('.md'));
  const loaded = await Promise.all(mdFiles.map(async f=>{
    const raw = await fetch(f.download_url).then(r=>r.text());
    return parseFrontmatter(raw, f.name);
  }));
  loaded.sort((a,b)=> (Number(b.order)||0) - (Number(a.order)||0) || (new Date(b.date) - new Date(a.date)));
  return loaded;
}

function renderLangSwitch(){
  document.querySelectorAll('#langSwitch button').forEach(btn=>{
    btn.classList.toggle('active', btn.dataset.lang === lang);
  });
}

let settings = null;

async function loadSettings(){
  try{
    const listUrl = `https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/content/settings.json?ref=${GH_BRANCH}`;
    const res = await fetch(listUrl);
    if(!res.ok) return null;
    const meta = await res.json();
    const raw = await fetch(meta.download_url).then(r=>r.text());
    return JSON.parse(raw);
  }catch(e){
    console.error('settings load failed', e);
    return null;
  }
}

function renderHeaderTexts(){
  document.querySelector('.blog-desc').textContent = t('desc');
  const roleEl = document.querySelector('.profile-widget .role');
  const nameEl = document.getElementById('profileName');
  if(settings){
    nameEl.textContent = settings.author_name || '기문탁';
    roleEl.textContent = settings['role_' + lang] || settings.role_ko || t('role');
  } else {
    roleEl.textContent = t('role');
  }
  document.querySelectorAll('.widget h3')[0].textContent = t('recent');
  document.querySelectorAll('.widget h3')[1].textContent = t('category');
  document.getElementById('loadingMsg').textContent = t('loading');
  document.getElementById('emptyMsg').textContent = t('empty');
  document.querySelector('.blog-footer').textContent = '© CRYPTO INSIGHT LAB · ' + t('footer');
}

function renderNav(){
  const nav = document.getElementById('navMenu');
  nav.innerHTML = CATS.map(c =>
    `<a href="#" data-cat="${c}" class="${c===activeCategory ? 'active':''}">${catLabel(c)}</a>`
  ).join('');
  nav.querySelectorAll('a').forEach(a=>{
a.addEventListener('click', e=>{
e.preventDefault();
activeCategory = a.dataset.cat;
if(location.hash){ location.hash = ''; }
renderNav();
renderPosts();
document.getElementById('postListView').classList.remove('hidden');
document.getElementById('postDetail').classList.remove('active');
window.scrollTo(0,0);
});
});
}

function renderPosts(){
const list = document.getElementById('postList');
const empty = document.getElementById('emptyMsg');
const filtered = activeCategory === "전체" ? posts : posts.filter(p=>p.category===activeCategory);

if(filtered.length===0){
list.innerHTML = "";
empty.style.display = "block";
return;
}
empty.style.display = "none";

list.innerHTML = filtered.map(p=>{
const title = cleanTitle(field(p, 'title')) || '(no title)';
const excerpt = field(p, 'excerpt');
const thumb = p.image ? '<img class="post-thumb" src="' + p.image + '" alt="' + title + '" loading="lazy">' : '';
return `
<article class="post-card" data-slug="${p.slug}">
${thumb}
<span class="post-tag">${catLabel(p.category)}</span>
<h2 class="post-title">${title}</h2>
<p class="post-excerpt">${excerpt}</p>
<div class="post-meta"><span>${p.date||''}</span><span class="post-author">${t('by')} ${p.author||''}</span></div>
</article>
`;}).join('');

list.querySelectorAll('.post-card').forEach(card=>{
card.addEventListener('click', ()=>{ location.hash = '#/post/' + card.dataset.slug; });
});
}

function renderDetail(slug){
const p = posts.find(x=>x.slug===slug);
const detail = document.getElementById('postDetail');
if(!p){
detail.innerHTML = '<button class="back-btn" id="backBtn">← ' + t('recent') + '</button><p>' + t('empty') + '</p>';
document.getElementById('backBtn').addEventListener('click', ()=>{ location.hash=''; });
return;
}
const title = cleanTitle(field(p, 'title')) || '(no title)';
const excerpt = field(p, 'excerpt');
const rawBody = field(p, 'body');
const body = (typeof marked !== 'undefined') ? marked.parse(rawBody) : rawBody;
const thumb = p.image ? '<img class="post-thumb" src="' + p.image + '" alt="' + title + '">' : '';
detail.innerHTML = `
<button class="back-btn" id="backBtn">← ${lang==='ko'?'목록으로':(lang==='en'?'Back to list':'返回列表')}</button>
<article class="post-card">
${thumb}
<span class="post-tag">${catLabel(p.category)}</span>
<h2 class="post-title">${title}</h2>
<p class="post-excerpt">${excerpt}</p>
<div class="post-meta"><span>${p.date||''}</span><span class="post-author">${t('by')} ${p.author||''}</span></div>
<div class="post-body">${body}</div>
</article>
`;
document.getElementById('backBtn').addEventListener('click', ()=>{ location.hash=''; });
}

function route(){
const hash = location.hash;
const m = hash.match(/^#\/post\/(.+)$/);
const listView = document.getElementById('postListView');
const detail = document.getElementById('postDetail');
if(m){
listView.classList.add('hidden');
detail.classList.add('active');
renderDetail(decodeURIComponent(m[1]));
window.scrollTo(0,0);
} else {
listView.classList.remove('hidden');
detail.classList.remove('active');
}
}
window.addEventListener('hashchange', route);

function renderSidebar(){
const recent = document.getElementById('popularList');
recent.innerHTML = posts.slice(0,5).map(p=>'<li data-slug="' + p.slug + '" style="cursor:pointer;">' + cleanTitle(field(p,'title')) + '</li>').join('');
recent.querySelectorAll('li').forEach(li=>{
li.addEventListener('click', ()=>{ location.hash = '#/post/' + li.dataset.slug; });
});

const catList = document.getElementById('categoryCountList');
const counts = {};
posts.forEach(p=> counts[p.category] = (counts[p.category]||0)+1);
catList.innerHTML = Object.entries(counts).map(([c,n])=>'<li>' + catLabel(c) + ' (' + n + ')</li>').join('');
}

function renderAll(){
  renderLangSwitch();
  renderHeaderTexts();
  renderNav();
  renderPosts();
  renderSidebar();
route();
}

document.querySelectorAll('#langSwitch button').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    lang = btn.dataset.lang;
    localStorage.setItem('lang', lang);
    renderAll();
  });
});

/* ===== 실시간 시세 (업비트 공개 API, 5초마다 갱신) ===== */
const TICKER_MAP = { 'KRW-BTC':'bitcoin', 'KRW-ETH':'ethereum', 'KRW-SOL':'solana', 'KRW-XRP':'ripple' };
async function updateTicker(){
try{
const ids = Object.values(TICKER_MAP).join(',');
const url = 'https://api.coingecko.com/api/v3/simple/price?ids=' + ids + '&vs_currencies=krw&include_24hr_change=true';
const res = await fetch(url);
const data = await res.json();
Object.entries(TICKER_MAP).forEach(([market, id])=>{
const coin = data[id];
if(!coin) return;
const chip = document.querySelector('.ticker-chip[data-market="' + market + '"]');
if(!chip) return;
const priceEl = chip.querySelector('.price');
const rateEl = chip.querySelector('.rate');
priceEl.textContent = '₩' + Math.round(coin.krw).toLocaleString();
const pct = (coin.krw_24h_change || 0).toFixed(2);
rateEl.textContent = (pct >= 0 ? '▲ ' : '▼ ') + Math.abs(pct) + '%';
rateEl.className = 'rate ' + (pct >= 0 ? 'up' : 'down');
});
}catch(e){
console.error('시세 갱신 실패', e);
}
}
updateTicker();
setInterval(updateTicker, 15000);

renderLangSwitch();
renderNav();
loadSettings().then(data=>{
  settings = data;
  renderHeaderTexts();
});
renderHeaderTexts();
loadPosts().then(data=>{
  posts = data;
  document.getElementById('loadingMsg').style.display = 'none';
  renderPosts();
  renderSidebar();
route();
}).catch(err=>{
  console.error(err);
  document.getElementById('loadingMsg').textContent = '글을 불러오지 못했습니다. index.html의 GH_USER / GH_REPO 값을 확인해주세요.';
});
</script>

</body>
</html>
